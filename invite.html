<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You've been invited to Pushup Debt</title>
  <meta name="description" content="Your friend invited you to Pushup Debt — the app that locks your phone until you do your push-ups." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --accent: #4ADE80;
      --gold: #D4A843; --text: #ffffff; --muted: #8E8E93;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: var(--card); border-radius: 28px;
      padding: 48px 36px; max-width: 400px; width: 100%;
      text-align: center; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .icon { font-size: 64px; line-height: 1; margin-bottom: 20px; display: block; }
    h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px; }
    h1 span { color: var(--accent); }
    p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--accent); color: #000; font-family: inherit;
      font-size: 16px; font-weight: 700; padding: 16px 32px;
      border-radius: 14px; text-decoration: none; width: 100%;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 8px 24px rgba(74,222,128,0.3);
    }
    .btn:hover { transform: scale(1.03); box-shadow: 0 12px 32px rgba(74,222,128,0.45); }
    .badge { display: inline-block; margin-top: 16px; font-size: 12px; color: var(--muted); }
    .badge strong { color: var(--gold); }
    .ios-only { margin-top: 28px; font-size: 12px; color: var(--muted); }
  </style>
  <script>
    // Attempt custom scheme on load (Safari fallback when app is installed)
    window.addEventListener('DOMContentLoaded', function () {
      var ref = new URLSearchParams(window.location.search).get('ref');
      if (ref) {
        window.location.href = 'pushupdebt://invite?ref=' + encodeURIComponent(ref);
      }
    });
  </script>
</head>
<body>
  <div class="card">
    <span class="icon">💪</span>
    <h1>Join <span>Pushup Debt</span></h1>
    <p>
      Your friend challenged you.<br />
      Pushup Debt locks your phone until you complete your push-ups.<br />
      Download the app and start your streak.
    </p>
    <a class="btn" id="appstore-link"
       href="https://apps.apple.com/app/id000000000">
      Download on the App Store
    </a>
    <div class="badge">Available on <strong>iOS</strong> · Free</div>
    <p class="ios-only">Already have the app? Open the link from iMessage or Safari.</p>
  </div>
  <script>
    var ref = new URLSearchParams(window.location.search).get('ref');
    if (ref) {
      document.getElementById('appstore-link').href += '?ref=' + encodeURIComponent(ref);
    }
  </script>
</body>
</html>
